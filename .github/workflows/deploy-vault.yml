name: Deploy vault to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'vault/**'
      - '.github/workflows/deploy-vault.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Cache-busting por deploy: los .js del iframe se cachean 4 h en el borde,
      # pero el HTML solo 10 min. Versionar los imports (?v=<sha>) hace que cada
      # deploy sea URL nueva → el iframe se propaga en <=10 min, no en 4 h.
      - name: Versionar imports (propagación rápida del iframe)
        run: |
          V=${GITHUB_SHA::8}
          sed -i "s|src=\"./vault.js\"|src=\"./vault.js?v=$V\"|" vault/index.html
          sed -i -E "s|from '(\./[a-zA-Z0-9_-]+\.js)'|from '\1?v=$V'|g" vault/*.js
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: 'vault'
      - id: deployment
        uses: actions/deploy-pages@v4
